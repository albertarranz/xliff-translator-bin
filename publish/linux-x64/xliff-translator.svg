<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" ry="48" fill="#1565C0"/>

  <!-- Back document (slightly offset, lighter blue) -->
  <rect x="80" y="52" width="100" height="126" rx="8" ry="8" fill="#FFFFFF" opacity="0.4"/>
  <rect x="88" y="72" width="60" height="6" rx="3" fill="#FFFFFF" opacity="0.5"/>
  <rect x="88" y="86" width="50" height="6" rx="3" fill="#FFFFFF" opacity="0.5"/>

  <!-- Front document (white) -->
  <rect x="62" y="68" width="100" height="126" rx="8" ry="8" fill="#FFFFFF"/>
  <!-- Fold corner -->
  <path d="M138 68 L162 92 L138 92 Z" fill="#BBDEFB"/>
  <rect x="138" y="68" width="24" height="24" rx="0" fill="#BBDEFB"/>
  <path d="M138 68 L162 92 L138 92 Z" fill="#90CAF9"/>

  <!-- Document lines on front page -->
  <rect x="74" y="100" width="64" height="6" rx="3" fill="#1565C0" opacity="0.35"/>
  <rect x="74" y="114" width="56" height="6" rx="3" fill="#1565C0" opacity="0.35"/>
  <rect x="74" y="128" width="60" height="6" rx="3" fill="#1565C0" opacity="0.35"/>
  <rect x="74" y="142" width="48" height="6" rx="3" fill="#1565C0" opacity="0.25"/>

  <!-- Translation arrow (amber) -->
  <g transform="translate(128, 176)">
	<!-- Arrow shaft -->
	<rect x="-30" y="-8" width="52" height="16" rx="8" fill="#FFB300"/>
	<!-- Arrow head -->
	<polygon points="26,-18 56,0 26,18" fill="#FFB300"/>
  </g>

  <!-- Small "XL" text hint at bottom of front doc -->
  <text x="74" y="164" font-family="Arial,sans-serif" font-weight="bold" font-size="13" fill="#1565C0" opacity="0.45">XLIFF</text>
</svg>
